name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend — test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Test
        run: pytest -q

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portfolio-frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Build
        run: npm run build

  # E2E — build the full stack via compose, then run Playwright against it.
  # Catches regressions like the media="print" CSS incident that unit builds
  # will not detect.
  e2e:
    name: E2E — Playwright
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Boot backend + frontend containers
        run: docker compose up --build -d

      - name: Wait for stack
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/api/health > /dev/null; then
              echo "stack ready after $i seconds"; exit 0
            fi
            sleep 1
          done
          echo "stack did not come up in 30s"
          docker compose logs
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E deps
        working-directory: e2e
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        working-directory: e2e
        env:
          BASE_URL: http://localhost:8080
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down
