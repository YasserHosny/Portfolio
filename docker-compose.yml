services:
  backend:
    build:
      context: ./portfolio-backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    environment:
      APP_ENV: local
      APP_DEBUG: "false"
      CORS_ORIGINS: "http://localhost:8080,http://localhost:4200"
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./portfolio-frontend
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: "8000"
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
